site_name: quellog
site_description: High-performance PostgreSQL log analyzer and parser
site_author: Alain L
repo_url: https://github.com/Alain-L/quellog
repo_name: Alain-L/quellog
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font: false
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.integrate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - attr_list
  - md_in_html

plugins:
  - search

exclude_docs: |
  README.md
  TODO_CORRECTIONS.md

extra_css:
  - stylesheets/extra.css

nav:
  - Documentation:
      - Installation: installation.md
      - PostgreSQL Setup: postgresql-setup.md
      - Log Formats: formats.md
      - Report Sections: default-report.md
      - SQL Analysis: sql-reports.md
      - Filtering: filtering.md
      - Export Formats: exports.md
  - How-tos:
      - Your First Analysis: howtos/first-analysis.md
      - Troubleshooting Slow Queries: howtos/slow-queries.md
      - Incident Triage: howtos/incident-triage.md
      - Generating Reports: howtos/generating-reports.md
      - Using jq with JSON Export: howtos/jq-recipes.md
      - Continuous Monitoring: howtos/continuous-monitoring.md
